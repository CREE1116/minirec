# Steam Dataset Configuration
dataset_name: "steam"
data_path: "data/steam/ratings.dat"
separator: "::"
columns: ["user_id", "item_id", "rating", "timestamp"]
has_header: false

# Preprocessing
min_user_interactions: 5
min_item_interactions: 0
rating_threshold: 0
dedup: true

# Splitting
split_method: "temporal_rs"
train_ratio: 0.8
valid_ratio: 0.1
seed: 42

# Global Evaluation Defaults
