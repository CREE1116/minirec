# Yahoo R3 Dataset Configuration
dataset_name: "yahoo-r3"
data_path: "data/yahooR3/train.txt"
separator: ","
columns: ["user_id", "item_id", "rating"]
has_header: false

# Preprocessing
min_user_interactions: 5
min_item_interactions: 0
rating_threshold: 0
dedup: true

# Splitting
split_method: "temporal_rs"
train_ratio: 0.8
valid_ratio: 0.1
seed: 42

# Global Evaluation Defaults
