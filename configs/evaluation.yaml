# Global Evaluation Settings
top_k: [10, 20, 50]
metrics: [
    "Recall",
    "NDCG",
    "HitRate",
    "Precision",
    "HeadRecall",
    "HeadNDCG",
    "MidRecall",
    "MidNDCG",
    "TailRecall",
    "TailNDCG",
    "Coverage",
    "TailCoverage",
    "MidCoverage",
    "HeadCoverage",
    "Novelty",
    "GiniIndex",
    "PopRatio"
]

# Metric calculation details
main_metric: "NDCG"
main_metric_k: 20

# Popularity-based splitting (Interaction Volume Ratios)
head_ratio: 0.8  # Top items covering 80% of interactions
mid_ratio: 0.1   # Next items covering 10% of interactions
# tail_ratio: 0.1  # Remaining items (automatically calculated as 1 - head - mid)
