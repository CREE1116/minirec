model:
  # Blurring-Sharpening Process Models (BSPM)
  # SIGIR 2023 - Choi et al.
  model_name: 'BSPM'
  K_b: 2              # 블러링 step 수
  T_b: 1.0            # 블러링 총 시간 (h_b = T_b / K_b)
  K_s: 1              # 샤프닝 step 수
  T_s: 2.5            # 샤프닝 총 시간 (h_s = T_s / K_s)
  idl_beta: 0.2       # 최종 IDL 샤프닝 계수
  final_sharpening: True # 최종 샤프닝 수행 여부
  device: 'auto'
