model:
  # LightGCN (Graph Convolutional Networks)
  model_name: "LightGCN"
  embedding_dim: 64
  n_layers: 3
  reg_weight: 1e-4
  device: "auto"

  train:
    optimizer: "Adam"
    epochs: 500
    batch_size: 2048
    lr: 0.001
    weight_decay: 0
    patience: 20
    loss_type: "pairwise"
    num_negatives: 1
    negative_sampling_strategy: "uniform"
