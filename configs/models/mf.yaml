model:
  # Matrix Factorization (BPR-MF)
  model_name: "MF"
  embedding_dim: 64
  reg_weight: 1e-4
  device: "auto"

  train:
    optimizer: "Adam"
    epochs: 500
    batch_size: 1024
    lr: 0.001
    weight_decay: 0
    patience: 20
    loss_type: "pairwise"
    num_negatives: 1
    negative_sampling_strategy: "uniform"
